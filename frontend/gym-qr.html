<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gym QR Code - GymPro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1A8C8C, #156F6F);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .qr-card {
      background: #fff;
      border-radius: 32px;
      padding: 30px 24px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .gym-icon {
      width: 80px;
      height: 80px;
      background: #1A8C8C;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 2.5rem;
    }
    .gym-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1A2E2E;
      margin-bottom: 4px;
    }
    .qr-container {
      background: #fff;
      padding: 20px;
      border-radius: 24px;
      margin: 20px 0;
      border: 2px solid #E0ECEC;
    }
    .qr-code {
      width: 220px;
      height: 220px;
      margin: 0 auto;
      display: block;
    }
    .instruction {
      background: #F0F5F5;
      padding: 16px;
      border-radius: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .instruction h4 {
      font-size: .9rem;
      margin-bottom: 12px;
      color: #1A8C8C;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: .85rem;
    }
    .step-number {
      width: 28px;
      height: 28px;
      background: #1A8C8C;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: .8rem;
      flex-shrink: 0;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 800;
      font-size: .9rem;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-primary { background: #1A8C8C; color: #fff; }
    .btn-secondary { background: #F0F5F5; color: #4A6464; }
    .note {
      font-size: .7rem;
      color: #8AABAB;
      margin-top: 16px;
      text-align: center;
    }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #1A8C8C;
      text-decoration: none;
      font-weight: 600;
      font-size: .85rem;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #8AABAB;
    }
    .test-info {
      background: #E8F8EF;
      border-radius: 12px;
      padding: 12px;
      margin: 16px 0;
      text-align: left;
    }
    .test-info h5 {
      font-size: .75rem;
      color: #27AE60;
      margin-bottom: 6px;
    }
    .test-info code {
      font-size: .6rem;
      word-break: break-all;
      background: #fff;
      padding: 6px;
      display: block;
      border-radius: 6px;
      color: #1A2E2E;
    }
  </style>
</head>
<body>
  <div class="qr-card" id="qrCard">
    <div class="loading">Loading QR Code...</div>
  </div>

  <script>
    const BASE = 'https://gym-pro-mvyv.onrender.com/api';
    const token = localStorage.getItem('token');
    
    if (!token) {
      window.location.href = '/login.html';
    }
    
    async function loadGymQR() {
      try {
        const res = await fetch(`${BASE}/qr/gym-qr`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) throw new Error('Failed to load');
        
        const data = await res.json();
        displayQR(data);
        
      } catch (err) {
        document.getElementById('qrCard').innerHTML = `
          <div style="text-align:center;padding:20px">
            <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
            <h3>Error Loading QR</h3>
            <p style="color:#8AABAB;margin-top:8px">${err.message}</p>
            <button class="btn btn-primary" onclick="location.reload()">Retry</button>
            <a href="/" class="back-link">← Back to Dashboard</a>
          </div>
        `;
      }
    }
    
    function displayQR(data) {
      const qrUrl = data.checkinUrl;
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrUrl)}`;
      
      document.getElementById('qrCard').innerHTML = `
        <div class="gym-icon">🏋️</div>
        <div class="gym-name">${escapeHtml(data.gymName)}</div>
        <div style="font-size:.8rem;color:#8AABAB;margin-top:4px">Member Self Check-in</div>
        
        <div class="qr-container">
          <img class="qr-code" src="${qrImageUrl}" alt="Gym QR Code">
          <div style="margin-top:12px;font-size:.7rem;color:#1A8C8C;font-weight:700">SCAN TO CHECK-IN</div>
        </div>
        
        <div class="instruction">
          <h4>📱 How Members Check-in:</h4>
          <div class="step">
            <div class="step-number">1</div>
            <div>Member scans this QR code using phone camera</div>
          </div>
          <div class="step">
            <div class="step-number">2</div>
            <div>Check-in page opens automatically</div>
          </div>
          <div class="step">
            <div class="step-number">3</div>
            <div>Enter Member ID or Phone Number</div>
          </div>
          <div class="step">
            <div class="step-number">4</div>
            <div>Attendance marked automatically!</div>
          </div>
        </div>
        
        <div class="test-info">
          <h5>🔗 QR Code Contains This URL:</h5>
          <code>${escapeHtml(qrUrl)}</code>
          <p style="font-size:.65rem;color:#8AABAB;margin-top:6px">When scanned, phone opens this link automatically</p>
        </div>
        
        <button class="btn btn-primary" onclick="downloadQR()">📥 Download QR Code (Print)</button>
        <button class="btn btn-secondary" onclick="window.location.href='/scan-stats.html'">📊 Today's Check-ins</button>
        
        <div class="note">
          💡 Place this QR code at the gym entrance.<br>
          Members scan with phone camera → Page opens → Enter details
        </div>
        
        <a href="/" class="back-link">← Back to Dashboard</a>
      `;
      
      window.currentQRUrl = qrUrl;
    }
    
    function downloadQR() {
      const qrImage = document.querySelector('.qr-code');
      if (qrImage) {
        const link = document.createElement('a');
        link.download = `gympro_checkin_qr.png`;
        link.href = qrImage.src;
        link.click();
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    loadGymQR();
  </script>
</body>
</html>
