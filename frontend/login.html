<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymPro - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6C47FF;
      --primary-dark: #5535e0;
      --primary-light: #EDE9FF;
      --success: #16a34a;
      --danger: #dc2626;
      --text: #1a1a2e;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f4f3ff;
      --card: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, #ede9ff66 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%, #c7d2fe44 0%, transparent 50%);
    }

    .wrapper { width: 100%; max-width: 420px; }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-logo {
      width: 60px; height: 60px;
      background: var(--primary);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 8px 28px #6C47FF40;
    }
    .brand h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .brand p { color: var(--muted); font-size: 0.88rem; margin-top: 4px; }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 32px rgba(108,71,255,0.10), 0 1px 4px rgba(0,0,0,0.05);
      border: 1px solid #ede9ff;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.5rem;
      gap: 4px;
    }
    .tab {
      flex: 1; padding: 9px;
      border: none; background: transparent;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: white; color: var(--primary);
      box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error  { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; display: block; }
    .msg.success{ background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; display: block; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; color: var(--text);
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none; appearance: none;
    }
    .field input:focus, .field select:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px #6C47FF15;
    }

    .hidden { display: none !important; }

    .btn {
      width: 100%; padding: 13px;
      background: var(--primary); color: white;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 0.5rem;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px #6C47FF38;
    }
    .btn:hover  { background: var(--primary-dark); box-shadow: 0 6px 20px #6C47FF50; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .hint {
      background: var(--primary-light);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.82rem; color: var(--primary-dark);
      margin-top: 1rem; text-align: center;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="brand-logo">🏋️</div>
    <h1>GymPro</h1>
    <p>Gym Management System</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tabLogin"    onclick="setMode('login')">Login</button>
      <button class="tab"        id="tabRegister" onclick="setMode('register')">Register</button>
    </div>

    <div class="msg" id="msg"></div>

    <form id="authForm" autocomplete="on">
      <div class="field hidden" id="nameField">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required autocomplete="current-password">
      </div>
      <div class="field hidden" id="roleField">
        <label>Role</label>
        <select id="role">
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn" id="submitBtn">Login</button>
    </form>

    <div class="hint">💡 First time? Register an admin account to get started.</div>
  </div>
</div>

<script>
  const API = 'https://gym-pro-mvyv.onrender.com/api/auth';
  let isLogin = true;

  if (localStorage.getItem('token')) window.location.href = '/';

  function setMode(mode) {
    isLogin = mode === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('nameField').classList.toggle('hidden', isLogin);
    document.getElementById('roleField').classList.toggle('hidden', isLogin);
    document.getElementById('submitBtn').textContent = isLogin ? 'Login' : 'Create Account';
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  document.getElementById('authForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Please wait…';
    showMsg('', '');

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!isLogin && !document.getElementById('name').value.trim()) {
      showMsg('Please enter your name.', 'error');
      btn.disabled = false; btn.textContent = 'Create Account'; return;
    }

    const body = isLogin
      ? { email, password }
      : { name: document.getElementById('name').value.trim(), email, password, role: document.getElementById('role').value };

    try {
      const res  = await fetch(`${API}/${isLogin ? 'login' : 'register'}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        showMsg(isLogin ? 'Login successful! Redirecting…' : 'Account created! Redirecting…', 'success');
        setTimeout(() => window.location.href = '/', 1200);
      } else {
        showMsg(data.error || data.message || 'Authentication failed.', 'error');
        btn.disabled = false;
        btn.textContent = isLogin ? 'Login' : 'Create Account';
      }
    } catch {
      showMsg('Network error. Check your connection.', 'error');
      btn.disabled = false;
      btn.textContent = isLogin ? 'Login' : 'Create Account';
    }
  });
</script>
</body>
</html>
