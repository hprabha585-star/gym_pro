<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymPro - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6C47FF;
      --primary-dark: #5535e0;
      --primary-light: #EDE9FF;
      --success: #16a34a;
      --danger: #dc2626;
      --text: #1a1a2e;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8f7ff;
      --card: #ffffff;
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image: radial-gradient(ellipse at 20% 50%, #ede9ff55 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #c7d2fe44 0%, transparent 50%);
    }

    .auth-wrapper {
      width: 100%;
      max-width: 440px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 8px 24px #6C47FF44;
    }

    .brand h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.75rem;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .auth-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 4px 32px rgba(108,71,255,0.1), 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid #ede9ff;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.5rem;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--card);
      color: var(--primary);
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px #6C47FF18;
    }

    .hidden-field { display: none; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 0.5rem;
      box-shadow: 0 4px 14px #6C47FF40;
    }

    .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 6px 20px #6C47FF55; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }

    .message.error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; display: block; }
    .message.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; display: block; }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 1rem 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .demo-hint {
      background: var(--primary-light);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--primary-dark);
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-logo">🏋️</div>
      <h1>GymPro</h1>
      <p>Gym Management System</p>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab-btn active" onclick="setMode('login')">Login</button>
        <button class="tab-btn" onclick="setMode('register')">Register</button>
      </div>

      <div id="msg" class="message"></div>

      <form id="auth-form" autocomplete="on">
        <div id="name-field" class="form-group hidden-field">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your full name" autocomplete="name">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required autocomplete="current-password">
        </div>

        <div id="role-field" class="form-group hidden-field">
          <label>Role</label>
          <select id="role">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Login</button>
      </form>

      <div class="demo-hint">
        💡 First time? Register an admin account to get started.
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://gym-pro-mvyv.onrender.com/api/auth';
    let isLogin = true;

    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = '/';

    function setMode(mode) {
      isLogin = mode === 'login';
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === isLogin));
      document.getElementById('name-field').classList.toggle('hidden-field', isLogin);
      document.getElementById('role-field').classList.toggle('hidden-field', isLogin);
      document.getElementById('submit-btn').textContent = isLogin ? 'Login' : 'Create Account';
      document.getElementById('msg').className = 'message';
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `message ${type}`;
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Please wait…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMsg('Please fill all required fields.', 'error');
        btn.disabled = false;
        btn.textContent = isLogin ? 'Login' : 'Create Account';
        return;
      }

      const endpoint = isLogin ? '/login' : '/register';
      const body = isLogin
        ? { email, password }
        : { name: document.getElementById('name').value.trim(), email, password, role: document.getElementById('role').value };

      if (!isLogin && !body.name) {
        showMsg('Please enter your name.', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      try {
        const res = await fetch(`${API_URL}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showMsg(isLogin ? 'Login successful! Redirecting…' : 'Account created! Redirecting…', 'success');
          setTimeout(() => window.location.href = '/', 1200);
        } else {
          showMsg(data.error || data.message || 'Authentication failed. Please try again.', 'error');
          btn.disabled = false;
          btn.textContent = isLogin ? 'Login' : 'Create Account';
        }
      } catch (err) {
        showMsg('Network error. Please check your connection.', 'error');
        btn.disabled = false;
        btn.textContent = isLogin ? 'Login' : 'Create Account';
      }
    });
  </script>
</body>
</html>
