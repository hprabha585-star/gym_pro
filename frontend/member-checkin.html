<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Member Check-in - GymPro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1A8C8C, #156F6F);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .checkin-card {
      background: #fff;
      border-radius: 32px;
      padding: 30px 24px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .success-icon, .error-icon { font-size: 4rem; margin-bottom: 16px; }
    .success-icon { color: #27AE60; }
    .error-icon { color: #E74C3C; }
    .welcome { font-size: 1.5rem; font-weight: 800; color: #1A2E2E; margin-bottom: 8px; }
    .member-details {
      background: #F0F5F5;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #E0ECEC;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-weight: 600; color: #8AABAB; }
    .detail-value { font-weight: 800; color: #1A2E2E; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label {
      display: block;
      font-size: .75rem;
      font-weight: 800;
      color: #1A8C8C;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px;
      border: 2px solid #E0ECEC;
      border-radius: 14px;
      font-family: inherit;
      font-size: .95rem;
      background: #fff;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1A8C8C;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary { background: #1A8C8C; color: #fff; }
    .btn-secondary { background: #F0F5F5; color: #4A6464; }
    .btn-success { background: #27AE60; color: #fff; }
    .streak {
      background: #E8F8EF;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      margin: 16px 0;
    }
    .streak-number { font-size: 1.8rem; font-weight: 800; color: #27AE60; }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #1A8C8C;
      text-decoration: none;
      font-weight: 600;
    }
    .hidden { display: none; }
    .qr-data { display: none; }
  </style>
</head>
<body>
  <div class="checkin-card" id="checkinCard">
    <div id="qrDataDisplay" class="qr-data"></div>
    
    <!-- Check-in Form -->
    <div id="checkinForm">
      <div style="font-size:3rem;margin-bottom:10px">📱</div>
      <h2 style="margin-bottom:8px">Gym Check-in</h2>
      <p style="color:#8AABAB;margin-bottom:24px">Enter your details to mark attendance</p>
      
      <div class="form-group">
        <label>Enter using</label>
        <select id="searchType" onchange="toggleSearchField()">
          <option value="memberId">Member ID</option>
          <option value="phone">Phone Number</option>
        </select>
      </div>
      
      <div class="form-group" id="memberIdField">
        <label>Member ID</label>
        <input type="text" id="memberId" placeholder="Enter your Member ID">
      </div>
      
      <div class="form-group hidden" id="phoneField">
        <label>Phone Number</label>
        <input type="tel" id="phoneNumber" placeholder="Enter 10-digit mobile number" maxlength="10">
      </div>
      
      <button class="btn btn-primary" onclick="submitCheckin()">✅ Check-in Now</button>
      
      <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #E0ECEC">
        <p style="font-size:.7rem;color:#8AABAB">
          💡 Don't have Member ID? Ask the gym staff.<br>
          Your attendance will be recorded instantly.
        </p>
      </div>
    </div>
    
    <!-- Success View -->
    <div id="successView" class="hidden">
      <div class="success-icon">✅</div>
      <div class="welcome" id="welcomeName"></div>
      <p id="checkinMessage" style="color:#27AE60;font-weight:600;margin-bottom:16px"></p>
      
      <div class="member-details">
        <div class="detail-row">
          <span class="detail-label">Plan</span>
          <span class="detail-value" id="memberPlan"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Valid Till</span>
          <span class="detail-value" id="expiryDate"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Check-in Time</span>
          <span class="detail-value" id="checkinTime"></span>
        </div>
      </div>
      
      <div id="streakDiv" class="streak hidden">
        <div class="streak-number" id="streakCount"></div>
        <div style="font-size:.75rem">days checked in this week</div>
      </div>
      
      <button class="btn btn-success" onclick="resetForm()">✓ Check-in Another Member</button>
      <button class="btn btn-secondary" onclick="viewMyAttendance()">📊 View My Attendance</button>
    </div>
    
    <!-- Error View -->
    <div id="errorView" class="hidden">
      <div class="error-icon">❌</div>
      <div class="welcome" style="color:#E74C3C">Check-in Failed</div>
      <p id="errorMessage" style="color:#E74C3C;margin:16px 0"></p>
      <button class="btn btn-primary" onclick="resetForm()">Try Again</button>
    </div>
    
    <!-- History View -->
    <div id="historyView" class="hidden">
      <div style="font-size:2rem;margin-bottom:10px">📊</div>
      <div class="welcome" id="historyName"></div>
      <p style="color:#8AABAB;margin-bottom:16px">Last 30 Days Attendance</p>
      
      <div class="streak" style="background:#1A8C8C;color:#fff">
        <div class="streak-number" style="color:#fff" id="totalPresent"></div>
        <div style="font-size:.75rem">days present (last 30 days)</div>
      </div>
      
      <div id="historyList" style="max-height:300px;overflow-y:auto;margin:16px 0"></div>
      
      <button class="btn btn-secondary" onclick="resetForm()">← Back to Check-in</button>
    </div>
  </div>

  <script>
    const BASE = 'https://gym-pro-mvyv.onrender.com/api';
    
    const urlParams = new URLSearchParams(window.location.search);
    const qrData = urlParams.get('qr');
    
    let currentGymQR = null;
    
    function toggleSearchField() {
      const searchType = document.getElementById('searchType').value;
      const memberIdField = document.getElementById('memberIdField');
      const phoneField = document.getElementById('phoneField');
      
      if (searchType === 'memberId') {
        memberIdField.classList.remove('hidden');
        phoneField.classList.add('hidden');
      } else {
        memberIdField.classList.add('hidden');
        phoneField.classList.remove('hidden');
      }
    }
    
    async function submitCheckin() {
      const searchType = document.getElementById('searchType').value;
      let memberId = null;
      let phoneNumber = null;
      
      if (searchType === 'memberId') {
        memberId = document.getElementById('memberId').value.trim();
        if (!memberId) {
          alert('Please enter your Member ID');
          return;
        }
      } else {
        phoneNumber = document.getElementById('phoneNumber').value.trim();
        if (!phoneNumber || phoneNumber.length !== 10) {
          alert('Please enter a valid 10-digit phone number');
          return;
        }
      }
      
      let gymQR = currentGymQR;
      if (!gymQR && qrData) {
        gymQR = qrData;
      }
      
      if (!gymQR) {
        alert('Invalid QR code. Please scan the gym QR code again.');
        return;
      }
      
      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = 'Processing...';
      btn.disabled = true;
      
      try {
        const response = await fetch(`${BASE}/qr/member-checkin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qrData: gymQR, memberId, phoneNumber })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          showSuccess(data);
        } else {
          showError(data.error || 'Check-in failed');
        }
      } catch (err) {
        showError('Network error. Please try again.');
      }
      
      btn.textContent = originalText;
      btn.disabled = false;
    }
    
    function showSuccess(data) {
      document.getElementById('checkinForm').classList.add('hidden');
      document.getElementById('errorView').classList.add('hidden');
      document.getElementById('historyView').classList.add('hidden');
      document.getElementById('successView').classList.remove('hidden');
      
      document.getElementById('welcomeName').textContent = data.memberName;
      document.getElementById('checkinMessage').textContent = data.message;
      document.getElementById('memberPlan').textContent = data.memberPlan || 'Standard';
      document.getElementById('expiryDate').textContent = data.expiryDate ? new Date(data.expiryDate).toLocaleDateString() : 'Active';
      document.getElementById('checkinTime').textContent = new Date().toLocaleTimeString();
      
      if (data.weeklyAttendance) {
        document.getElementById('streakDiv').classList.remove('hidden');
        document.getElementById('streakCount').textContent = data.weeklyAttendance;
      }
    }
    
    function showError(message) {
      document.getElementById('checkinForm').classList.add('hidden');
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('historyView').classList.add('hidden');
      document.getElementById('errorView').classList.remove('hidden');
      document.getElementById('errorMessage').textContent = message;
    }
    
    async function viewMyAttendance() {
      const searchType = document.getElementById('searchType').value;
      let memberId = null;
      let phoneNumber = null;
      
      if (searchType === 'memberId') {
        memberId = document.getElementById('memberId').value.trim();
      } else {
        phoneNumber = document.getElementById('phoneNumber').value.trim();
      }
      
      let gymQR = currentGymQR || qrData;
      
      if (!gymQR) {
        alert('QR data missing');
        return;
      }
      
      try {
        const response = await fetch(`${BASE}/qr/my-attendance`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ gymQRData: gymQR, memberId, phoneNumber })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          displayHistory(data);
        } else {
          alert(data.error || 'Failed to load history');
          resetForm();
        }
      } catch (err) {
        alert('Network error');
      }
    }
    
    function displayHistory(data) {
      document.getElementById('checkinForm').classList.add('hidden');
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('errorView').classList.add('hidden');
      document.getElementById('historyView').classList.remove('hidden');
      
      document.getElementById('historyName').textContent = data.memberName;
      document.getElementById('totalPresent').textContent = data.totalPresent;
      
      const historyList = document.getElementById('historyList');
      
      if (data.history.length === 0) {
        historyList.innerHTML = '<p style="text-align:center;color:#8AABAB;padding:20px">No attendance records yet</p>';
      } else {
        historyList.innerHTML = data.history.map(h => `
          <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #E0ECEC">
            <span>📅 ${h.date}</span>
            <span style="color:${h.status === 'Present' ? '#27AE60' : '#E74C3C'};font-weight:700">${h.status === 'Present' ? '✓ Present' : '✗ Absent'}</span>
            <span style="font-size:.7rem;color:#8AABAB">${h.checkinMethod === 'qr_member' ? 'QR' : 'Manual'}</span>
          </div>
        `).join('');
      }
    }
    
    function resetForm() {
      document.getElementById('checkinForm').classList.remove('hidden');
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('errorView').classList.add('hidden');
      document.getElementById('historyView').classList.add('hidden');
      document.getElementById('memberId').value = '';
      document.getElementById('phoneNumber').value = '';
    }
    
    if (qrData) {
      currentGymQR = qrData;
    }
    
    toggleSearchField();
  </script>
</body>
</html>
