<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Today's Check-ins - GymPro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F0F5F5;
      padding: 20px;
      padding-bottom: 40px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .header {
      background: linear-gradient(135deg, #1A8C8C, #156F6F);
      color: #fff;
      padding: 24px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .header h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .stat-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    .stat-number {
      font-size: 2.5rem;
      font-weight: 800;
      color: #1A8C8C;
    }
    .member-list {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
    }
    .member-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid #E0ECEC;
    }
    .member-info h4 { font-size: 1rem; margin-bottom: 4px; }
    .member-info p { font-size: .7rem; color: #8AABAB; }
    .checkin-time {
      font-size: .7rem;
      color: #27AE60;
      font-weight: 700;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #8AABAB;
    }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
    }
    .btn-primary { background: #1A8C8C; color: #fff; width: 100%; }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #1A8C8C;
      text-decoration: none;
      font-weight: 600;
      text-align: center;
      width: 100%;
    }
    .refresh {
      text-align: right;
      margin-bottom: 10px;
    }
    .refresh-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="refresh">
      <button class="refresh-btn" onclick="loadCheckins()">🔄</button>
    </div>
    
    <div class="header">
      <h1>📊 Today's Check-ins</h1>
      <p id="currentDate"></p>
    </div>
    
    <div class="stat-card">
      <div class="stat-number" id="totalCount">0</div>
      <div style="font-size:.8rem;color:#8AABAB">members checked in today</div>
    </div>
    
    <div class="member-list" id="memberList">
      <div class="empty">Loading...</div>
    </div>
    
    <button class="btn btn-primary" onclick="location.reload()">🔄 Refresh</button>
    <a href="/" class="back-link">← Back to Dashboard</a>
  </div>

  <script>
    const BASE = 'https://gym-pro-mvyv.onrender.com/api';
    const token = localStorage.getItem('token');
    
    if (!token) {
      window.location.href = '/login.html';
    }
    
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-IN', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    
    async function loadCheckins() {
      try {
        const res = await fetch(`${BASE}/qr/today-checkins`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) throw new Error('Failed to load');
        
        const data = await res.json();
        
        document.getElementById('totalCount').textContent = data.totalCheckins;
        
        const memberList = document.getElementById('memberList');
        
        if (data.members.length === 0) {
          memberList.innerHTML = '<div class="empty">✨ No check-ins yet today</div>';
          return;
        }
        
        memberList.innerHTML = data.members.map(m => `
          <div class="member-item">
            <div class="member-info">
              <h4>${escapeHtml(m.name)}</h4>
              <p>${escapeHtml(m.plan)} | 📱 ${m.phone}</p>
              <p style="font-size:.65rem;margin-top:4px">Method: ${m.method === 'qr_member' ? 'QR Self Check-in' : 'Manual'}</p>
            </div>
            <div class="checkin-time">
              ${new Date(m.checkinTime).toLocaleTimeString()}
            </div>
          </div>
        `).join('');
        
      } catch (err) {
        document.getElementById('memberList').innerHTML = '<div class="empty">❌ Error loading check-ins</div>';
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    loadCheckins();
    setInterval(loadCheckins, 30000);
  </script>
</body>
</html>
