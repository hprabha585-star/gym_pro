<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GymPro — Super Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F0F5F5;color:#1A2E2E;padding:16px;padding-bottom:40px;-webkit-tap-highlight-color:transparent}
    .container{max-width:700px;margin:0 auto}

    /* Header */
    .header{background:linear-gradient(135deg,#1A2E2E,#2D4E4E);border-radius:20px;padding:20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .header-left h1{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:2px}
    .header-left p{font-size:.75rem;color:rgba(255,255,255,.55)}
    .header-right{display:flex;gap:8px;align-items:center}
    .logout-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 14px;border-radius:10px;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer}
    .logout-btn:hover{background:rgba(255,255,255,.2)}

    /* Stats row */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid #E0ECEC;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .stat-num{font-size:1.8rem;font-weight:800;color:#1A8C8C;line-height:1}
    .stat-lbl{font-size:.65rem;color:#8AABAB;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:5px}

    /* Section */
    .section{background:#fff;border-radius:18px;margin-bottom:14px;overflow:hidden;border:1px solid #E0ECEC;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .sec-head{padding:14px 16px;background:#F8FFFE;border-bottom:1.5px solid #E0ECEC;font-weight:800;font-size:.95rem;display:flex;align-items:center;justify-content:space-between}
    .sec-head-left{display:flex;align-items:center;gap:8px}
    .badge-count{background:#1A8C8C;color:#fff;border-radius:20px;padding:2px 10px;font-size:.7rem;font-weight:800}
    .badge-count.red{background:#E74C3C}

    /* Gym cards */
    .gym-card{padding:14px 16px;border-bottom:1px solid #F0F5F5}
    .gym-card:last-child{border-bottom:none}
    .gym-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .gym-info h3{font-size:.95rem;font-weight:800;color:#1A2E2E;margin-bottom:3px}
    .gym-info .gym-meta{font-size:.75rem;color:#8AABAB;margin-top:2px}
    .gym-info .gym-email{font-size:.78rem;color:#4A6464;font-weight:600;margin-top:2px}
    .gym-info .reg-date{font-size:.68rem;color:#B0C4C4;margin-top:4px}
    .btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}

    /* Buttons */
    .btn{padding:8px 16px;border:none;border-radius:10px;font-family:inherit;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .18s}
    .btn:active{transform:scale(.96)}
    .btn-approve{background:#27AE60;color:#fff}
    .btn-reject{background:#E74C3C;color:#fff}
    .btn-deactivate{background:#F39C12;color:#fff}
    .btn-activate{background:#1A8C8C;color:#fff}
    .btn-delete{background:#F0F5F5;color:#E74C3C;border:1px solid #FECDD5}
    .btn-ghost{background:#F0F5F5;color:#4A6464;border:1px solid #E0ECEC}
    .btn-sm{padding:6px 12px;font-size:.72rem}

    /* Status badges */
    .status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:800}
    .s-pending{background:#FEF9E7;color:#D97706}
    .s-active{background:#E8F8EF;color:#27AE60}
    .s-rejected{background:#FEE2E2;color:#E74C3C}
    .s-inactive{background:#F3F4F6;color:#6B7280}

    /* Empty state */
    .empty{text-align:center;padding:36px 20px;color:#8AABAB}
    .empty .ei{font-size:2.5rem;margin-bottom:8px}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:16px;right:16px;max-width:500px;margin:0 auto;
      background:#1A2E2E;color:#fff;padding:13px 16px;border-radius:12px;
      text-align:center;font-weight:700;font-size:.85rem;
      transform:translateY(120px);transition:transform .3s cubic-bezier(.22,1,.36,1);
      z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.2)}
    .toast.show{transform:translateY(0)}
    .toast.success{background:#27AE60}
    .toast.error{background:#E74C3C}

    /* Reject modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
    .modal-bg.open{display:flex}
    .modal{background:#fff;border-radius:18px;padding:20px;width:100%;max-width:400px}
    .modal h3{font-size:1rem;font-weight:800;margin-bottom:12px;color:#1A2E2E}
    .modal textarea{width:100%;padding:12px;border:2px solid #E0ECEC;border-radius:10px;font-family:inherit;font-size:.88rem;resize:vertical;min-height:80px}
    .modal .modal-btns{display:flex;gap:8px;margin-top:12px}
    .modal .modal-btns button{flex:1}

    /* Gym avatar */
    .gym-av{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1A8C8C,#156F6F);
      display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:800;flex-shrink:0}
    .gym-av-wrap{display:flex;align-items:flex-start;gap:12px}

    @media(max-width:480px){.stats{grid-template-columns:repeat(3,1fr)}.stat-num{font-size:1.4rem}}
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>🏆 GymPro Control Panel</h1>
      <p id="saEmail" style="color:rgba(255,255,255,.5);font-size:.72rem"></p>
    </div>
    <div class="header-right">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="sPending">—</div>
      <div class="stat-lbl">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="sActive">—</div>
      <div class="stat-lbl">Active Gyms</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="sTotal">—</div>
      <div class="stat-lbl">Total Gyms</div>
    </div>
  </div>

  <!-- Pending Approvals -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-head-left">⏳ Pending Gym Approvals <span class="badge-count red" id="pendingBadge">0</span></div>
      <button class="btn btn-ghost btn-sm" onclick="loadAll()">🔄 Refresh</button>
    </div>
    <div id="pendingList"><div class="empty"><div class="ei">✨</div><p>Loading…</p></div></div>
  </div>

  <!-- All Gyms -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-head-left">🏋️ All Registered Gyms <span class="badge-count" id="gymsBadge">0</span></div>
    </div>
    <div id="gymsList"><div class="empty"><div class="ei">⏳</div><p>Loading…</p></div></div>
  </div>

</div>

<!-- Reject modal -->
<div class="modal-bg" id="rejectModal">
  <div class="modal">
    <h3>❌ Reject Gym Registration</h3>
    <p style="font-size:.82rem;color:#8AABAB;margin-bottom:10px">This will notify the gym owner. Provide a reason:</p>
    <textarea id="rejectReason" placeholder="e.g. Incomplete information, duplicate registration…"></textarea>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeRejectModal()">Cancel</button>
      <button class="btn btn-reject" onclick="confirmReject()">Confirm Reject</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const BASE = 'https://gym-pro-mvyv.onrender.com/api';
const hdrs = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${localStorage.getItem('token')}` });
let _rejectUserId = null;

// ── Auth guard ────────────────────────────────────────────────
(function() {
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  if (!u || u.role !== 'superadmin') {
    window.location.href = '/login.html';
    return;
  }
  document.getElementById('saEmail').textContent = u.email || '';
})();

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  window.location.href = '/login.html';
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 3000);
}

// ── Escape HTML ───────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Format date ───────────────────────────────────────────────
function fDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
}

// ── Gym avatar initials ───────────────────────────────────────
function gymAv(name) {
  const i = (name||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
  const colors = ['#1A8C8C','#2980B9','#27AE60','#8E44AD','#E67E22','#E74C3C'];
  const bg = colors[(name||'').charCodeAt(0) % colors.length];
  return `<div class="gym-av" style="background:linear-gradient(135deg,${bg},${bg}CC)">${esc(i)}</div>`;
}

// ── Load everything ───────────────────────────────────────────
async function loadAll() {
  await Promise.all([ loadPending(), loadGyms() ]);
}

async function loadPending() {
  try {
    const res = await fetch(`${BASE}/auth/pending-approvals`, { headers: hdrs() });
    if (res.status === 401) { logout(); return; }
    const list = await res.json();

    document.getElementById('sPending').textContent = list.length;
    document.getElementById('pendingBadge').textContent = list.length;

    const el = document.getElementById('pendingList');
    if (!list.length) {
      el.innerHTML = '<div class="empty"><div class="ei">✅</div><p>No pending approvals</p></div>';
      return;
    }

    el.innerHTML = list.map(u => `
      <div class="gym-card">
        <div class="gym-av-wrap">
          ${gymAv(u.gymName || u.name)}
          <div class="gym-info" style="flex:1;min-width:0">
            <h3>${esc(u.gymName || u.name)}'s Gym</h3>
            <div class="gym-email">👤 ${esc(u.name)} &nbsp;|&nbsp; ✉️ ${esc(u.email)}</div>
            <div class="reg-date">📅 Registered: ${fDate(u.createdAt)}</div>
            <span class="status s-pending" style="margin-top:6px;display:inline-block">⏳ Awaiting Approval</span>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-approve" onclick="approveGym('${esc(u._id)}','${esc(u.gymName||u.name)}')">✅ Approve Gym</button>
          <button class="btn btn-reject"  onclick="openRejectModal('${esc(u._id)}')">❌ Reject</button>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('pendingList').innerHTML = '<div class="empty"><p style="color:#E74C3C">Error loading</p></div>';
  }
}

async function loadGyms() {
  try {
    const res = await fetch(`${BASE}/admin/all-gyms`, { headers: hdrs() });
    if (!res.ok) throw new Error();
    const gyms = await res.json();

    const active = gyms.filter(g => g.isActive && g.isApproved).length;
    document.getElementById('sActive').textContent = active;
    document.getElementById('sTotal').textContent  = gyms.length;
    document.getElementById('gymsBadge').textContent = gyms.length;

    const el = document.getElementById('gymsList');
    if (!gyms.length) {
      el.innerHTML = '<div class="empty"><div class="ei">🏋️</div><p>No gyms yet</p></div>';
      return;
    }

    el.innerHTML = gyms.map(u => {
      const statusCls = u.isApproved && u.isActive ? 's-active'
        : !u.isApproved && !u.pendingApproval ? 's-rejected' : 's-inactive';
      const statusLabel = u.isApproved && u.isActive ? '✅ Active'
        : !u.isApproved && !u.pendingApproval ? '❌ Rejected' : '⚠️ Inactive';
      return `
        <div class="gym-card">
          <div class="gym-av-wrap">
            ${gymAv(u.gymName || u.name)}
            <div class="gym-info" style="flex:1;min-width:0">
              <h3>${esc(u.gymName || u.name)}'s Gym</h3>
              <div class="gym-email">👤 ${esc(u.name)} &nbsp;|&nbsp; ✉️ ${esc(u.email)}</div>
              <div class="gym-meta">📅 Approved: ${fDate(u.approvedAt)} &nbsp;|&nbsp; 🕐 Last login: ${fDate(u.lastLogin)}</div>
              <span class="status ${statusCls}" style="margin-top:5px;display:inline-block">${statusLabel}</span>
            </div>
          </div>
          <div class="btn-row">
            ${u.isActive
              ? `<button class="btn btn-deactivate btn-sm" onclick="toggleGym('${esc(u._id)}','${esc(u.gymName||u.name)}',false)">🔴 Deactivate</button>`
              : `<button class="btn btn-activate btn-sm"   onclick="toggleGym('${esc(u._id)}','${esc(u.gymName||u.name)}',true)">🟢 Activate</button>`
            }
            <button class="btn btn-delete btn-sm" onclick="deleteGym('${esc(u._id)}','${esc(u.gymName||u.name)}')">🗑️ Remove</button>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('gymsList').innerHTML = '<div class="empty"><p style="color:#E74C3C">Error loading gyms</p></div>';
  }
}

// ── Approve ───────────────────────────────────────────────────
async function approveGym(userId, gymName) {
  try {
    const res = await fetch(`${BASE}/auth/approve/${userId}`, { method:'POST', headers:hdrs() });
    const data = await res.json();
    if (res.ok) { toast(`✅ ${gymName}'s gym approved!`, 'success'); loadAll(); }
    else toast(data.error || 'Approval failed', 'error');
  } catch(e) { toast('Network error', 'error'); }
}

// ── Reject modal ──────────────────────────────────────────────
function openRejectModal(userId) {
  _rejectUserId = userId;
  document.getElementById('rejectReason').value = '';
  document.getElementById('rejectModal').classList.add('open');
}
function closeRejectModal() {
  document.getElementById('rejectModal').classList.remove('open');
  _rejectUserId = null;
}
async function confirmReject() {
  const reason = document.getElementById('rejectReason').value.trim() || 'Not approved by GymPro team.';
  try {
    const res = await fetch(`${BASE}/auth/reject/${_rejectUserId}`, {
      method:'POST', headers:hdrs(), body:JSON.stringify({ reason })
    });
    const data = await res.json();
    if (res.ok) { toast('Registration rejected', 'success'); closeRejectModal(); loadAll(); }
    else toast(data.error || 'Failed', 'error');
  } catch(e) { toast('Network error', 'error'); }
}

// ── Toggle gym active ─────────────────────────────────────────
async function toggleGym(userId, name, activate) {
  try {
    const res = await fetch(`${BASE}/admin/user/${userId}/toggle`, { method:'PATCH', headers:hdrs() });
    const data = await res.json();
    if (res.ok) { toast(`${name} ${activate?'activated':'deactivated'}`, 'success'); loadGyms(); }
    else toast(data.error || 'Failed', 'error');
  } catch(e) { toast('Network error', 'error'); }
}

// ── Delete gym ────────────────────────────────────────────────
async function deleteGym(userId, name) {
  if (!confirm(`Permanently remove "${name}" gym account? This cannot be undone.`)) return;
  try {
    const res = await fetch(`${BASE}/admin/user/${userId}`, { method:'DELETE', headers:hdrs() });
    const data = await res.json();
    if (res.ok) { toast(`${name} removed`, 'success'); loadAll(); }
    else toast(data.error || 'Failed', 'error');
  } catch(e) { toast('Network error', 'error'); }
}

// ── Init ──────────────────────────────────────────────────────
loadAll();
setInterval(loadPending, 30000); // auto-refresh pending every 30s
</script>
</body>
</html>
